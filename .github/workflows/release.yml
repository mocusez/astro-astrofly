name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create source archive
        run: |
          # Create archives with version in filename
          git archive --format=tar.gz --prefix=blog_butterfly-${{ steps.version.outputs.VERSION }}/ HEAD -o blog_butterfly-${{ steps.version.outputs.VERSION }}.tar.gz
          git archive --format=zip --prefix=blog_butterfly-${{ steps.version.outputs.VERSION }}/ HEAD -o blog_butterfly-${{ steps.version.outputs.VERSION }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            blog_butterfly-${{ steps.version.outputs.VERSION }}.tar.gz
            blog_butterfly-${{ steps.version.outputs.VERSION }}.zip
